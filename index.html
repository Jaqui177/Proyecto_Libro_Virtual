<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f39ac7" />
  <title>Libro Virtual Bonito</title>
  <link rel="stylesheet" href="style.css?v=phonefix-20260407" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">💌 Para ti</p>
      <h1>Nuestro libro</h1>
    </header>

    <section class="book-stage">
      <div class="book-frame">
        <div class="book-spine"></div>
        <article class="book-page left" id="leftPage"></article>
        <article class="book-page right" id="rightPage"></article>
      </div>

      <div class="book-actions">
        <button id="prevBtn" aria-label="Página anterior">←</button>
        <span id="pageIndicator">Vista 1 de 9</span>
        <button id="nextBtn" aria-label="Página siguiente">→</button>
      </div>
    </section>
  </main>

  <script>
    const pages = [
      "imagenes/imagen1.jpg",
      "imagenes/imagen2.jpg",
      "imagenes/imagen3.jpg",
      "imagenes/imagen4.jpg",
      "imagenes/imagen5.jpg",
      "imagenes/imagen6.jpg",
      "imagenes/imagen7.jpg",
      "imagenes/imagen8.jpg",
      "imagenes/imagen9.jpg",
      "imagenes/imagen10.jpg",
      "imagenes/imagen11.jpg",
      "imagenes/imagen12.jpg",
      "imagenes/imagen13.jpg",
      "imagenes/imagen14.jpg",
      "imagenes/imagen15.jpg",
      "imagenes/imagen16.jpg",
      "imagenes/imagen17.jpg"
    ];

    const leftPage = document.getElementById("leftPage");
    const rightPage = document.getElementById("rightPage");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageIndicator = document.getElementById("pageIndicator");

    const spreadCount = Math.ceil(pages.length / 2);
    let currentSpread = 0;

    function createFallback(pageNumber) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#ffdce9" />
              <stop offset="100%" stop-color="#fff7fb" />
            </linearGradient>
          </defs>
          <rect width="800" height="1000" rx="38" fill="url(#g)" />
          <text x="400" y="280" text-anchor="middle" font-size="120">💗</text>
          <text x="400" y="450" text-anchor="middle" font-size="34" font-family="Verdana, sans-serif" fill="#7f4a67">Imagen ${pageNumber}</text>
        </svg>`;

      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function createFinalMessageImage() {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#fffafd" />
              <stop offset="100%" stop-color="#fff1f7" />
            </linearGradient>
          </defs>
          <rect width="800" height="1000" rx="36" fill="url(#g)" />
          <rect x="42" y="42" width="716" height="916" rx="28" fill="none" stroke="#e8cfdb" stroke-width="4" />
          <text x="400" y="170" text-anchor="middle" font-size="42">💌</text>
          <text x="400" y="245" text-anchor="middle" font-size="38" font-family="Georgia, serif" fill="#8a3d67">Dos meses juntos</text>
          <text x="400" y="360" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#7a4561">Gracias por hacer mis días más bonitos.</text>
          <text x="400" y="455" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#7a4561">En este poquito tiempo te volviste</text>
          <text x="400" y="495" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#7a4561">alguien muy especial para mí.</text>
          <text x="400" y="610" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#7a4561">Quiero seguir cumpliendo meses, años</text>
          <text x="400" y="650" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#7a4561">y muchos recuerdos contigo 💗</text>
        </svg>`;

      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function pageTemplate(imagePath, pageNumber) {
      const fallback = createFallback(pageNumber);

      return `
        <div class="image-wrap only-image">
          <img src="${imagePath}" alt="Imagen ${pageNumber}" onerror="this.onerror=null;this.src='${fallback}';" />
        </div>
        <span class="page-number">${pageNumber}</span>
      `;
    }

    function renderSpread() {
      const leftIndex = currentSpread * 2;
      const rightIndex = leftIndex + 1;

      leftPage.innerHTML = pageTemplate(pages[leftIndex], leftIndex + 1);
      rightPage.innerHTML = pages[rightIndex]
        ? pageTemplate(pages[rightIndex], rightIndex + 1)
        : pageTemplate(createFinalMessageImage(), leftIndex + 2);
      prevBtn.disabled = currentSpread === 0;
      nextBtn.disabled = currentSpread === spreadCount - 1;
      pageIndicator.textContent = `Vista ${currentSpread + 1} de ${spreadCount}`;

      leftPage.classList.remove("flip");
      rightPage.classList.remove("flip");
      void leftPage.offsetWidth;
      leftPage.classList.add("flip");
      rightPage.classList.add("flip");
    }

    prevBtn.addEventListener("click", () => {
      if (currentSpread > 0) {
        currentSpread -= 1;
        renderSpread();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentSpread < spreadCount - 1) {
        currentSpread += 1;
        renderSpread();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft" && currentSpread > 0) {
        currentSpread -= 1;
        renderSpread();
      }

      if (event.key === "ArrowRight" && currentSpread < spreadCount - 1) {
        currentSpread += 1;
        renderSpread();
      }
    });

    renderSpread();
  </script>
</body>
</html>
